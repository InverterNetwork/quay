          type: string
          format: date-time
        summary:
          type: string
        payload:
          type: object
          additionalProperties: true
          description: Page-owned bounded semantic context snapshot.
    AgentEvent:
      oneOf:
        - $ref: "#/components/schemas/AgentMessageStartEvent"
        - $ref: "#/components/schemas/AgentTextDeltaEvent"
        - $ref: "#/components/schemas/AgentToolCallEvent"
        - $ref: "#/components/schemas/AgentReferenceEvent"
        - $ref: "#/components/schemas/AgentApprovalRequiredEvent"
        - $ref: "#/components/schemas/AgentCommandOutputEvent"
        - $ref: "#/components/schemas/AgentApprovalResultEvent"
        - $ref: "#/components/schemas/AgentErrorEvent"
        - $ref: "#/components/schemas/AgentMessageDoneEvent"
      discriminator:
        propertyName: type
        mapping:
          message_start: "#/components/schemas/AgentMessageStartEvent"
          text_delta: "#/components/schemas/AgentTextDeltaEvent"
          tool_call: "#/components/schemas/AgentToolCallEvent"
          reference: "#/components/schemas/AgentReferenceEvent"
          approval_required: "#/components/schemas/AgentApprovalRequiredEvent"
          command_output: "#/components/schemas/AgentCommandOutputEvent"
          approval_result: "#/components/schemas/AgentApprovalResultEvent"
          error: "#/components/schemas/AgentErrorEvent"
          message_done: "#/components/schemas/AgentMessageDoneEvent"
    AgentNdjsonStream:
      type: string
      format: binary
      description: Newline-delimited JSON stream. Each non-empty line is one `AgentEvent`.
      examples:
        - |
          {"type":"message_start","messageId":"agent_123","role":"agent","model":"hermes-agent"}
          {"type":"text_delta","messageId":"agent_123","text":"Checking tasks..."}
          {"type":"message_done","messageId":"agent_123"}
      x-event-schema:
        $ref: "#/components/schemas/AgentEvent"
    AgentSseStream:
      type: string
      format: binary
      description: Server-Sent Events stream. Each `agent_event` data payload is one `AgentEvent`; `[DONE]` terminates the stream.
      examples:
        - |
          event: agent_event
          data: {"type":"message_start","messageId":"agent_123","role":"agent","model":"hermes-agent"}

          event: agent_event
          data: {"type":"message_done","messageId":"agent_123"}

          data: [DONE]
      x-event-schema:
        $ref: "#/components/schemas/AgentEvent"
