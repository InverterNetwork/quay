openapi: 3.1.0
info:
  title: Quay Admin API
  version: 1.0.0
  description: Loopback Admin API for Quay UI integrations. Deployments may require bearer auth with QUAY_ADMIN_TOKEN.
servers:
  - url: http://127.0.0.1:9731
security:
  - AdminBearer: []
  - {}
paths:
  /v1/meta:
    get:
      summary: Inspect the running Quay API service.
      operationId: getMeta
      responses:
        "200":
          description: Runtime metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meta"
        "401":
          $ref: "#/components/responses/AdminAuthRequired"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "403":
          $ref: "#/components/responses/CorsOriginNotAllowed"
    options:
      summary: CORS preflight for runtime metadata.
      operationId: optionsMeta
      responses:
        "204":
          $ref: "#/components/responses/CorsPreflight"
        "403":
          $ref: "#/components/responses/CorsOriginNotAllowed"
  /v1/repos:
    get:
      summary: List active registered repos.
      operationId: listRepos
      responses:
        "200":
          description: Active repo registry rows ordered by repo_id.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Repo"
        "401":
          $ref: "#/components/responses/AdminAuthRequired"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "403":
          $ref: "#/components/responses/CorsOriginNotAllowed"
    options:
      summary: CORS preflight for repo listing.
      operationId: optionsRepos
      responses:
        "204":
          $ref: "#/components/responses/CorsPreflight"
        "403":
          $ref: "#/components/responses/CorsOriginNotAllowed"
  /v1/repos/{repo_id}:
    get:
      summary: Get one active registered repo.
      operationId: getRepo
      parameters:
        - name: repo_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: One active repo registry row.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepoDetail"
        "401":
          $ref: "#/components/responses/AdminAuthRequired"
        "404":
          description: Repo is unknown or archived.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "403":
          $ref: "#/components/responses/CorsOriginNotAllowed"
    options:
      summary: CORS preflight for repo detail.
      operationId: optionsRepo
      parameters:
        - name: repo_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          $ref: "#/components/responses/CorsPreflight"
        "403":
          $ref: "#/components/responses/CorsOriginNotAllowed"
  /v1/global:
    get:
      summary: Read global Admin UI configuration state.
      operationId: getGlobal
      responses:
        "200":
          description: Global read model for Quay UI.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlobalReadModel"
        "401":
          $ref: "#/components/responses/AdminAuthRequired"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "403":
          $ref: "#/components/responses/CorsOriginNotAllowed"
    options:
      summary: CORS preflight for global read model.
      operationId: optionsGlobal
      responses:
        "204":
          $ref: "#/components/responses/CorsPreflight"
        "403":
          $ref: "#/components/responses/CorsOriginNotAllowed"
  /v1/tags:
    get:
      summary: Read deployment tag namespaces.
      operationId: listDeploymentTags
      responses:
        "200":
          description: Deployment tag vocabulary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagsResponse"
        "401":
          $ref: "#/components/responses/AdminAuthRequired"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "403":
          $ref: "#/components/responses/CorsOriginNotAllowed"
    options:
      summary: CORS preflight for deployment tags.
      operationId: optionsTags
      responses:
        "204":
          $ref: "#/components/responses/CorsPreflight"
        "403":
          $ref: "#/components/responses/CorsOriginNotAllowed"
  /v1/tasks:
    get:
      summary: Read Mission Control task cards.
      operationId: listMissionControlTasks
      responses:
        "200":
          description: Task board read model for the Mission Control UI.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MissionControlReadModel"
        "401":
          $ref: "#/components/responses/AdminAuthRequired"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "403":
          $ref: "#/components/responses/CorsOriginNotAllowed"
    options:
      summary: CORS preflight for Mission Control task cards.
      operationId: optionsMissionControlTasks
      responses:
        "204":
          $ref: "#/components/responses/CorsPreflight"
        "403":
          $ref: "#/components/responses/CorsOriginNotAllowed"
  /v1/matrix:
    get:
      summary: Read the cross-repo resolved settings matrix.
      operationId: getMatrix
      responses:
        "200":
          description: Matrix rows keyed by repo_id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatrixReadModel"
        "401":
          $ref: "#/components/responses/AdminAuthRequired"
        "405":
          $ref: "#/components/responses/MethodNotAllowed"
        "403":
          $ref: "#/components/responses/CorsOriginNotAllowed"
    options:
      summary: CORS preflight for matrix read model.
      operationId: optionsMatrix
      responses:
        "204":
          $ref: "#/components/responses/CorsPreflight"
        "403":
          $ref: "#/components/responses/CorsOriginNotAllowed"
  /v1/changes/preview:
    post:
      summary: Validate and preview a structured Admin UI change set.
      operationId: previewChanges
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeRequest"
      responses:
        "200":
          description: Server-generated deterministic preview.
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangePreview"
        "401":
          $ref: "#/components/responses/AdminAuthRequired"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/StaleRevision"
        "422":
          $ref: "#/components/responses/UnsupportedChange"
        "403":
          $ref: "#/components/responses/CorsOriginNotAllowed"
    options:
      summary: CORS preflight for change preview.
      operationId: optionsChangePreview
      responses:
        "204":
          $ref: "#/components/responses/CorsPreflight"
        "403":
          $ref: "#/components/responses/CorsOriginNotAllowed"
  /v1/changes/apply:
    post:
      summary: Atomically apply a structured Admin UI change set.
      operationId: applyChanges
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeRequest"
      responses:
        "200":
          description: Applied change result with the refreshed read model.
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeApplyResponse"
        "401":
          $ref: "#/components/responses/AdminAuthRequired"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/StaleRevision"
        "422":
          $ref: "#/components/responses/UnsupportedChange"
        "500":
          $ref: "#/components/responses/ApplyFailed"
        "403":
          $ref: "#/components/responses/CorsOriginNotAllowed"
    options:
      summary: CORS preflight for change apply.
      operationId: optionsChangeApply
      responses:
        "204":
          $ref: "#/components/responses/CorsPreflight"
        "403":
          $ref: "#/components/responses/CorsOriginNotAllowed"
  /v1/agent/sessions:
    post:
      summary: Create a temporary Quay Agent session.
      operationId: createAgentSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentCreateSessionRequest"
      responses:
        "200":
          description: Agent session created for the current browser-tab thread.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSessionResponse"
        "401":
          $ref: "#/components/responses/AdminAuthRequired"
        "400":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/AgentGatewayFailed"
        "403":
          $ref: "#/components/responses/CorsOriginNotAllowed"
    options:
      summary: CORS preflight for agent session creation.
      operationId: optionsAgentSessions
      responses:
        "204":
          $ref: "#/components/responses/CorsPreflight"
        "403":
          $ref: "#/components/responses/CorsOriginNotAllowed"
  /v1/agent/sessions/{session_id}/messages:
    post:
      summary: Send a user message and stream normalized Quay Agent events.
      operationId: sendAgentMessage
      parameters:
        - $ref: "#/components/parameters/AgentSessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentMessageRequest"
      responses:
        "200":
          description: Stream of normalized `AgentEvent` objects as NDJSON or SSE.
          content:
            application/x-ndjson:
              schema:
                $ref: "#/components/schemas/AgentNdjsonStream"
            text/event-stream:
              schema:
                $ref: "#/components/schemas/AgentSseStream"
        "401":
          $ref: "#/components/responses/AdminAuthRequired"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/AgentSessionNotFound"
        "500":
          $ref: "#/components/responses/AgentGatewayFailed"
        "403":
          $ref: "#/components/responses/CorsOriginNotAllowed"
    options:
      summary: CORS preflight for agent messages.
      operationId: optionsAgentMessages
      parameters:
        - $ref: "#/components/parameters/AgentSessionId"
      responses:
        "204":
          $ref: "#/components/responses/CorsPreflight"
        "403":
          $ref: "#/components/responses/CorsOriginNotAllowed"
  /v1/agent/sessions/{session_id}/approvals/{approval_id}:
    post:
      summary: Approve or reject a proposed Quay Agent action.
      operationId: decideAgentApproval
      parameters:
        - $ref: "#/components/parameters/AgentSessionId"
        - $ref: "#/components/parameters/AgentApprovalId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentApprovalDecisionRequest"
      responses:
        "200":
          description: Stream of normalized `AgentEvent` objects for the approval decision lifecycle.
          content:
            application/x-ndjson:
              schema:
                $ref: "#/components/schemas/AgentNdjsonStream"
            text/event-stream:
              schema:
                $ref: "#/components/schemas/AgentSseStream"
        "401":
          $ref: "#/components/responses/AdminAuthRequired"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/AgentSessionNotFound"
        "409":
          description: Approval has already been decided.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/AgentGatewayFailed"
        "403":
          $ref: "#/components/responses/CorsOriginNotAllowed"
    options:
      summary: CORS preflight for agent approval decisions.
      operationId: optionsAgentApprovals
      parameters:
        - $ref: "#/components/parameters/AgentSessionId"
        - $ref: "#/components/parameters/AgentApprovalId"
      responses:
        "204":
          $ref: "#/components/responses/CorsPreflight"
        "403":
          $ref: "#/components/responses/CorsOriginNotAllowed"
  /v1/agent/sessions/{session_id}/stop:
    post:
      summary: Stop the active agent turn for a temporary session.
      operationId: stopAgentSession
      parameters:
        - $ref: "#/components/parameters/AgentSessionId"
      responses:
        "200":
          description: Active agent turn was interrupted where possible.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentStopResponse"
        "401":
          $ref: "#/components/responses/AdminAuthRequired"
        "404":
          $ref: "#/components/responses/AgentSessionNotFound"
        "500":
          $ref: "#/components/responses/AgentGatewayFailed"
        "403":
          $ref: "#/components/responses/CorsOriginNotAllowed"
    options:
      summary: CORS preflight for agent stop.
      operationId: optionsAgentStop
      parameters:
        - $ref: "#/components/parameters/AgentSessionId"
      responses:
        "204":
          $ref: "#/components/responses/CorsPreflight"
        "403":
          $ref: "#/components/responses/CorsOriginNotAllowed"
components:
  securitySchemes:
    AdminBearer:
      type: http
      scheme: bearer
  parameters:
    AgentSessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
      description: Quay-owned temporary browser-tab agent session ID.
    AgentApprovalId:
      name: approval_id
      in: path
      required: true
      schema:
        type: string
      description: Proposed action approval ID from an `approval_required` event.
  responses:
    CorsPreflight:
      description: Allowed local UI origin preflight response.
      headers:
        Access-Control-Allow-Origin:
          schema:
            type: string
        Access-Control-Allow-Methods:
          schema:
            type: string
        Access-Control-Allow-Headers:
          schema:
            type: string
        Access-Control-Max-Age:
          schema:
            type: string
        Vary:
          schema:
            type: string
    CorsOriginNotAllowed:
      description: Origin is not in the local UI allow-list.
      headers:
        Vary:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    MethodNotAllowed:
      description: HTTP method is not supported for this route.
      headers:
        Allow:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    AdminAuthRequired:
      description: Admin bearer auth is required or the supplied token is invalid.
      headers:
        WWW-Authenticate:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationError:
      description: Request JSON or structured change payload is invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    StaleRevision:
      description: The submitted base revision no longer matches server state.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    UnsupportedChange:
      description: The change type is not supported by this API version.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ApplyFailed:
      description: The change set failed during apply and was rolled back where practical.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    AgentSessionNotFound:
      description: Agent session or approval is unknown.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    AgentGatewayFailed:
      description: Agent Gateway request failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Meta:
      type: object
      additionalProperties: false
      required:
        - service
        - api_version
        - quay_version
        - viewer
      properties:
        service:
          type: string
          const: quay
        api_version:
          type: string
          const: v1
        quay_version:
          type: string
        viewer:
          $ref: "#/components/schemas/MetaViewer"
    MetaViewer:
      type: object
      additionalProperties: false
      required:
        - label
        - display_name
        - slack_user_id
      properties:
        label:
          type: string
          description: Display label for the current Admin UI operator.
        display_name:
          type:
            - string
            - "null"
          description: Trusted upstream display name, when forwarded.
        slack_user_id:
          type:
            - string
            - "null"
          description: Trusted upstream Slack user id, when forwarded.
    MissionControlReadModel:
      type: object
      additionalProperties: false
      required:
        - refreshedAt
        - activeTaskCount
        - hasAttention
        - tasks
      properties:
        refreshedAt:
          type: string
          format: date-time
        activeTaskCount:
          type: integer
          minimum: 0
        hasAttention:
          type: boolean
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/MissionControlTask"
    MissionControlTask:
      type: object
      additionalProperties: false
      required:
        - id
        - ext
        - repo
        - repoUrl
        - title
        - branch
        - state
        - pr
        - prUrl
        - isReviewOnly
        - role
        - reviewStatus
        - budget
        - total
        - latest
        - agent
        - age
        - updatedAt
        - authors
      properties:
        id:
          type: string
        ext:
          type: string
        repo:
          type: string
        repoUrl:
          type:
            - string
            - "null"
          format: uri
        title:
          type: string
        branch:
          type: string
        state:
          $ref: "#/components/schemas/TaskState"
        pr:
          type:
            - integer
            - "null"
        prUrl:
          type:
            - string
            - "null"
          format: uri
        isReviewOnly:
          type: boolean
        role:
          type: string
          enum:
            - worker
            - review
        reviewStatus:
          type:
            - string
            - "null"
          enum:
            - reviewing
            - changes requested
            - approved
            - review
            - null
        budget:
          type: integer
          minimum: 0
        total:
          type: integer
          minimum: 0
        latest:
          type: string
        agent:
          type: string
        age:
          type: string
        updatedAt:
          type: string
          format: date-time
        authors:
          type: array
          items:
            type: string
        attn:
          $ref: "#/components/schemas/MissionControlAttentionReason"
        attnTone:
          type: string
          enum:
            - warn
            - danger
    TaskState:
      type: string
      enum:
        - queued
        - waiting_dependencies
        - running
        - goal-completion-pending
        - pr-open
        - pr-review
        - done
        - awaiting-next-brief
        - claimed-by-orchestrator
        - waiting_human
        - waiting_external_changes
        - non_budget_loop
        - worktree_error
        - orchestrator_loop
        - cancelled
        - merged
        - closed_unmerged
    MissionControlAttentionReason:
      type: string
      enum:
        - changes
        - ci
        - slack
        - brief
        - dependency
        - budget
        - loop
        - worktree
    Repo:
      type: object
      additionalProperties: false
      required:
        - repo_id
        - repo_url
        - base_branch
        - package_manager
        - install_cmd
        - test_cmd
        - ci_workflow_name
        - contribution_guide_path
        - agent_worker
        - agent_reviewer
        - model_worker
        - model_reviewer
        - preamble_worker
        - preamble_reviewer
        - archived_at
        - created_at
      properties:
        repo_id:
          type: string
        repo_url:
          type: string
        base_branch:
          type: string
        package_manager:
          type: string
        install_cmd:
          type: string
        test_cmd:
          type:
            - string
            - "null"
        ci_workflow_name:
          type:
            - string
            - "null"
        contribution_guide_path:
          type:
            - string
            - "null"
        agent_worker:
          type:
            - string
            - "null"
        agent_reviewer:
          type:
            - string
            - "null"
        model_worker:
          type:
            - string
            - "null"
        model_reviewer:
          type:
            - string
            - "null"
        preamble_worker:
          type:
            - integer
            - "null"
          minimum: 1
        preamble_reviewer:
          type:
            - integer
            - "null"
          minimum: 1
        archived_at:
          type:
            - string
            - "null"
        created_at:
          type: string
    RepoDetail:
      type: object
      additionalProperties: false
      required:
        - revision
        - repo_id
        - repo_url
        - base_branch
        - package_manager
        - install_cmd
        - test_cmd
        - ci_workflow_name
        - contribution_guide_path
        - agent_worker
        - agent_reviewer
        - model_worker
        - model_reviewer
        - preamble_worker
        - preamble_reviewer
        - archived_at
        - created_at
        - active_task_count
        - effective_preambles
        - tag_namespaces
        - inherited_tag_namespaces
      properties:
        revision:
          type: string
        repo_id:
          type: string
        repo_url:
          type: string
        base_branch:
          type: string
        package_manager:
          type: string
        install_cmd:
          type: string
        test_cmd:
          type:
            - string
            - "null"
        ci_workflow_name:
          type:
            - string
            - "null"
        contribution_guide_path:
          type:
            - string
            - "null"
        agent_worker:
          type:
            - string
            - "null"
        agent_reviewer:
          type:
            - string
            - "null"
        model_worker:
          type:
            - string
            - "null"
        model_reviewer:
          type:
            - string
            - "null"
        preamble_worker:
          type:
            - integer
            - "null"
          minimum: 1
        preamble_reviewer:
          type:
            - integer
            - "null"
          minimum: 1
        archived_at:
          type:
            - string
            - "null"
        created_at:
          type: string
        active_task_count:
          type: integer
          minimum: 0
        effective_preambles:
          $ref: "#/components/schemas/RepoEffectivePreambles"
        tag_namespaces:
          type: array
          items:
            $ref: "#/components/schemas/TagNamespace"
        inherited_tag_namespaces:
          type: array
          items:
            $ref: "#/components/schemas/TagNamespace"
    RepoEffectivePreambles:
      type: object
      additionalProperties: false
      required:
        - worker
        - reviewer
      properties:
        worker:
          $ref: "#/components/schemas/RepoEffectivePreamble"
        reviewer:
          $ref: "#/components/schemas/RepoEffectivePreamble"
    RepoEffectivePreamble:
      type: object
      additionalProperties: false
      required:
        - role
        - kind
        - source
        - configured_preamble_id
        - effective_preamble_id
        - title
        - body
        - refs
        - last_edited
      properties:
        role:
          type: string
          enum:
            - worker
            - reviewer
        kind:
          type: string
          enum:
            - code
            - review
        source:
          type: string
          enum:
            - repo
            - global
        configured_preamble_id:
          type:
            - integer
            - "null"
          minimum: 1
        effective_preamble_id:
          type: integer
          minimum: 0
        title:
          type: string
        body:
          type: string
        refs:
          type: integer
          minimum: 0
        last_edited:
          type:
            - string
            - "null"
    GlobalReadModel:
      type: object
      additionalProperties: false
      required:
        - revision
        - config_path
        - data_dir
        - paths
        - operations
        - adapters
        - agents
        - preambles
        - retry_templates
        - tag_namespaces
      properties:
        revision:
          type: string
        config_path:
          type:
            - string
            - "null"
        data_dir:
          type: string
        paths:
          $ref: "#/components/schemas/RuntimePaths"
        operations:
          $ref: "#/components/schemas/OperationsReadModel"
        adapters:
          type: array
          items:
            $ref: "#/components/schemas/AdapterSummary"
        agents:
          $ref: "#/components/schemas/AgentsReadModel"
        preambles:
