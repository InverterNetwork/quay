name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      QUAY_SKIP_TMUX_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run typecheck
      - name: Build binaries
        run: |
          bun build --compile --target=bun-linux-x64    src/cli/index.ts --outfile dist/quay-linux-amd64
          bun build --compile --target=bun-linux-arm64  src/cli/index.ts --outfile dist/quay-linux-arm64
          bun build --compile --target=bun-darwin-x64   src/cli/index.ts --outfile dist/quay-darwin-amd64
          bun build --compile --target=bun-darwin-arm64 src/cli/index.ts --outfile dist/quay-darwin-arm64
      - name: Smoke test linux-amd64 binary
        run: ./dist/quay-linux-amd64 --version
      - name: Generate checksums
        working-directory: dist
        run: sha256sum quay-* > SHA256SUMS
      - name: Create release
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/quay-* dist/SHA256SUMS
