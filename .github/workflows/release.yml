name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Build binaries
        run: |
          for target in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            bun build --compile --target=bun-${target} src/cli/index.ts --outfile dist/quay-${target}
          done
      - name: Generate checksums
        working-directory: dist
        run: sha256sum quay-* > SHA256SUMS
      - name: Create release
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/quay-darwin-arm64 \
            dist/quay-darwin-x64 \
            dist/quay-linux-x64 \
            dist/quay-linux-arm64 \
            dist/SHA256SUMS
